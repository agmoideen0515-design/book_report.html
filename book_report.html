<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMS Office Detailed Report</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
        .header-box { text-align: center; border-bottom: 3px solid #1a5d1a; margin-bottom: 25px; padding-bottom: 10px; }
        h2 { color: #1a5d1a; margin: 0; }
        .admin-controls { background: #e8f5e9; padding: 15px; border-radius: 10px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        select { padding: 10px; border-radius: 6px; border: 1px solid #ccc; min-width: 200px; }
        .btn-print { background: #1a5d1a; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #1a5d1a; color: white; padding: 12px; text-align: left; border: 1px solid #144514; }
        td { border: 1px solid #ddd; padding: 12px; font-weight: bold; font-size: 1.1em; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .count-cell { color: #e65100; font-size: 1.3em; text-align: center; width: 100px; }

        @media print {
            .admin-controls, .btn-print { display: none !important; }
            .container { box-shadow: none; border: 1px solid #eee; width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h2>MEMS TRIKARIPUR</h2>
        <p><b>DETAILED BOOK STOCK REPORT - 2026</b></p>
    </div>

    <div class="admin-controls">
        <div>
            <label><b>ക്ലാസ്സ് തിരഞ്ഞെടുക്കുക:</b> </label>
            <select id="classFilter" onchange="generateDetailedReport()">
                <option value="all">എല്ലാ ക്ലാസ്സുകളും (Total)</option>
                <option value="3">Class 3</option><option value="4">Class 4</option>
                <option value="5">Class 5</option><option value="6">Class 6</option>
                <option value="7">Class 7</option><option value="8">Class 8</option>
            </select>
        </div>
        <button class="btn-print" onclick="window.print()">🖨️ Print Report</button>
    </div>

    <div id="resultArea">
        </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzBTYh1xyzmR_7P_RmZ0MXTauh-3OSyNBOU0fk1ztq_AIHKPsfnB_41yqI6_7VHKf8V/exec';
    let allData = [];

    fetch(scriptURL).then(res => res.json()).then(data => {
        allData = data;
        generateDetailedReport();
    });

    function generateDetailedReport() {
        const classVal = document.getElementById('classFilter').value;
        const filtered = allData.filter(item => (classVal === 'all' || String(item.sClass) === classVal));

        let bookCounts = {};

        // ഓരോ കുട്ടിയും തിരഞ്ഞെടുത്ത പുസ്തകങ്ങളെ വേർതിരിച്ച് എണ്ണുന്നു
        filtered.forEach(item => {
            const books = item.selectedBooks.split(','); // കോമ ഉണ്ടെങ്കിൽ വേർതിരിക്കും
            books.forEach(book => {
                let bookName = book.trim();
                if (bookName) {
                    bookCounts[bookName] = (bookCounts[bookName] || 0) + 1;
                }
            });
        });

        let html = `<h3>${classVal === 'all' ? 'സ്കൂളിലെ ആകെ കണക്ക്' : 'ക്ലാസ്സ്: ' + classVal}</h3>`;
        html += '<table><thead><tr><th>പുസ്തകത്തിന്റെ പേര്</th><th>ആവശ്യമുള്ള എണ്ണം</th></tr></thead><tbody>';

        const sortedBooks = Object.keys(bookCounts).sort();
        
        if (sortedBooks.length === 0) {
            html += '<tr><td colspan="2" style="text-align:center;">വിവരങ്ങൾ ലഭ്യമല്ല</td></tr>';
        } else {
            sortedBooks.forEach(book => {
                html += `<tr>
                    <td>${book}</td>
                    <td class="count-cell">${bookCounts[book]}</td>
                </tr>`;
            });
        }

        html += '</tbody></table>';
        html += `<p style="margin-top:20px; color:#666;">ആകെ ഓർഡർ നൽകിയ കുട്ടികൾ: ${filtered.length}</p>`;
        
        document.getElementById('resultArea').innerHTML = html;
    }
</script>

</body>
</html>
