<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMS Office Detailed Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans Malayalam', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
        .header-box { text-align: center; border-bottom: 3px solid #1a5d1a; margin-bottom: 20px; padding-bottom: 10px; }
        h2 { color: #1a5d1a; margin: 0; }
        
        .admin-controls { background: #e8f5e9; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        select { padding: 10px; border-radius: 6px; border: 1px solid #ccc; min-width: 150px; font-family: 'Noto Sans Malayalam', sans-serif; }
        
        .btn-action { padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; border: none; font-family: 'Noto Sans Malayalam', sans-serif; }
        .btn-print { background: #1a5d1a; color: white; margin-left: auto; }
        .btn-info { background: #0277bd; color: white; }

        #descriptionArea { display: none; background: #fffde7; border: 2px solid #fbc02d; padding: 20px; border-radius: 10px; margin-bottom: 25px; }
        .summary-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        .summary-table td, .summary-table th { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .summary-table th { background: #fff9c4; color: #333; }
        .count-bold { color: #d32f2f; font-size: 1.2em; font-weight: bold; text-align: center; }

        .report-card { border: 1px solid #ddd; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
        .report-header { background: #1a5d1a; color: white; padding: 12px; }
        .report-header h3 { margin: 0; font-size: 1.1em; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; color: #333; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; }
        td { border-bottom: 1px solid #eee; padding: 12px; font-weight: bold; }
        .count-column { text-align: center; color: #d32f2f; font-size: 1.2em; width: 100px; }

        @media print {
            .admin-controls, .btn-action { display: none !important; }
            #descriptionArea { display: block !important; border: 1px solid #333; background: white; }
            .container { box-shadow: none; width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h2>MEMS TRIKARIPUR</h2>
        <p><b>ഓഫീസ് ബുക്ക് റിപ്പോർട്ട് - 2026</b></p>
    </div>

    <div class="admin-controls">
        <label>ക്ലാസ്സ്:</label>
        <select id="classFilter" onchange="generateReport()">
            <option value="3">Class 3</option><option value="4">Class 4</option>
            <option value="5">Class 5</option><option value="6">Class 6</option>
            <option value="7">Class 7</option><option value="8">Class 8</option>
        </select>
        <label>ഡിവിഷൻ:</label>
        <select id="divFilter" onchange="generateReport()">
            <option value="all">എല്ലാ ഡിവിഷനും</option>
            <option value="A">A</option><option value="B">B</option><option value="C">C</option>
            <option value="D">D</option><option value="E">E</option><option value="F">F</option><option value="G">G</option>
        </select>
        
        <button class="btn-action btn-info" onclick="toggleDescription()">വിവരണം കാണുക</button>
        <button class="btn-action btn-print" onclick="window.print()">പ്രിന്റ് എടുക്കുക</button>
    </div>

    <div id="descriptionArea"></div>
    <div id="reportArea"></div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzBTYh1xyzmR_7P_RmZ0MXTauh-3OSyNBOU0fk1ztq_AIHKPsfnB_41yqI6_7VHKf8V/exec';
    let allData = [];

    fetch(scriptURL).then(res => res.json()).then(data => {
        allData = data;
        generateReport();
    });

    function toggleDescription() {
        const area = document.getElementById('descriptionArea');
        area.style.display = (area.style.display === 'block') ? 'none' : 'block';
    }

    function generateReport() {
        const classVal = document.getElementById('classFilter').value;
        const divVal = document.getElementById('divFilter').value;
        const classData = allData.filter(item => String(item.sClass) === classVal);
        
        let classBookCounts = {};
        classData.forEach(item => {
            item.selectedBooks.split(',').forEach(name => {
                let clean = name.trim();
                if (clean) classBookCounts[clean] = (classBookCounts[clean] || 0) + 1;
            });
        });

        // വിവരണ പട്ടിക തയ്യാറാക്കുന്നു
        let descHtml = `<h4>ക്ലാസ്സ് ${classVal} - ആകെ കിതാബ് കണക്ക്</h4>`;
        descHtml += `<table class="summary-table"><thead><tr><th>കിതാബിന്റെ പേര് (പേരും തരവും)</th><th style="text-align:center;">ആകെ എണ്ണം</th></tr></thead><tbody>`;
        
        Object.keys(classBookCounts).sort().forEach(book => {
            descHtml += `<tr><td>${book}</td><td class="count-bold">${classBookCounts[book]}</td></tr>`;
        });
        descHtml += `</tbody></table>`;
        document.getElementById('descriptionArea').innerHTML = descHtml;

        const filtered = classData.filter(item => (divVal === 'all' || item.division === divVal));
        let html = '';
        const divisions = divVal === 'all' ? [...new Set(filtered.map(item => item.division))].sort() : [divVal];

        divisions.forEach((div) => {
            const divData = filtered.filter(item => item.division === div);
            if (divData.length === 0) return;

            let divBookCounts = {};
            divData.forEach(item => {
                item.selectedBooks.split(',').forEach(name => {
                    let clean = name.trim();
                    if (clean) divBookCounts[clean] = (divBookCounts[clean] || 0) + 1;
                });
            });

            html += `
                <div class="report-card">
                    <div class="report-header"><h3>ക്ലാസ്സ്: ${classVal}${div} (കുട്ടികൾ: ${divData.length})</h3></div>
                    <table>
                        <thead><tr><th>കിതാബ്</th><th style="text-align:center;">എണ്ണം</th></tr></thead>
                        <tbody>
                            ${Object.keys(divBookCounts).sort().map(name => `
                                <tr><td>${name}</td><td class="count-column">${divBookCounts[name]}</td></tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>`;
        });
        document.getElementById('reportArea').innerHTML = html || '<p style="text-align:center;">ഡാറ്റ ലഭ്യമല്ല.</p>';
    }
</script>

</body>
</html>
