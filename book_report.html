<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMS Office Stock Report</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        .header-box { text-align: center; border-bottom: 3px solid #1a5d1a; margin-bottom: 25px; padding-bottom: 10px; }
        h2 { color: #1a5d1a; margin: 0; }
        .admin-controls { background: #e8f5e9; padding: 15px; border-radius: 10px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        select { padding: 10px; border-radius: 6px; border: 1px solid #ccc; min-width: 200px; }
        .btn-print { background: #1a5d1a; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        /* Stock Card Design */
        .stock-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .stock-box { padding: 20px; border-radius: 12px; text-align: center; color: white; }
        .text-bg { background: #2e7d32; } /* Green */
        .work-bg { background: #e65100; } /* Orange */
        .stock-box h3 { margin: 0; font-size: 1.2em; opacity: 0.9; }
        .stock-box div { font-size: 3em; font-weight: bold; margin: 10px 0; }
        .stock-box p { margin: 0; font-weight: bold; }

        @media print {
            .admin-controls, .btn-print { display: none !important; }
            .container { box-shadow: none; border: 1px solid #eee; }
            .stock-box { border: 1px solid #333; color: black !important; }
            .text-bg, .work-bg { background: white !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h2>MEMS TRIKARIPUR</h2>
        <p><b>OFFICE STOCK REQUIREMENT REPORT - 2026</b></p>
    </div>

    <div class="admin-controls">
        <div>
            <label><b>ക്ലാസ്സ് തിരഞ്ഞെടുക്കുക:</b> </label>
            <select id="classFilter" onchange="calculateStock()">
                <option value="all">എല്ലാ ക്ലാസ്സുകളും (Total)</option>
                <option value="3">Class 3</option>
                <option value="4">Class 4</option>
                <option value="5">Class 5</option>
                <option value="6">Class 6</option>
                <option value="7">Class 7</option>
                <option value="8">Class 8</option>
            </select>
        </div>
        <button class="btn-print" onclick="window.print()">🖨️ Print Stock List</button>
    </div>

    <div id="resultArea">
        </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzBTYh1xyzmR_7P_RmZ0MXTauh-3OSyNBOU0fk1ztq_AIHKPsfnB_41yqI6_7VHKf8V/exec';
    let allData = [];

    fetch(scriptURL).then(res => res.json()).then(data => {
        allData = data;
        calculateStock();
    });

    function calculateStock() {
        const classVal = document.getElementById('classFilter').value;
        const filtered = allData.filter(item => (classVal === 'all' || String(item.sClass) === classVal));

        let textCount = 0;
        let workCount = 0;

        filtered.forEach(item => {
            const books = item.selectedBooks.toLowerCase();
            if(books.includes("text")) textCount++;
            if(books.includes("work")) workCount++;
        });

        const className = classVal === 'all' ? 'മൊത്തം ക്ലാസ്സുകൾ' : `ക്ലാസ്സ്: ${classVal}`;

        document.getElementById('resultArea').innerHTML = `
            <div style="text-align:center; margin-bottom:20px; font-weight:bold; font-size:1.2em; color:#333;">
                ${className}
            </div>
            <div class="stock-container">
                <div class="stock-box text-bg">
                    <h3>ടെക്സ്റ്റ് ബുക്കുകൾ</h3>
                    <div>${textCount}</div>
                    <p>എണ്ണം ആവശ്യമുണ്ട്</p>
                </div>
                <div class="stock-box work-bg">
                    <h3>വർക്ക് ബുക്കുകൾ</h3>
                    <div>${workCount}</div>
                    <p>എണ്ണം ആവശ്യമുണ്ട്</p>
                </div>
            </div>
            <div style="margin-top:30px; border-top:1px dashed #ccc; padding-top:10px; font-size:0.9em; color:#666;">
                ആകെ ഓർഡർ നൽകിയ കുട്ടികൾ: ${filtered.length}
            </div>
        `;
    }
</script>

</body>
</html>
