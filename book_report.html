<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMS Division-wise Stock Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Noto Sans Malayalam', sans-serif; /* ഫോണ്ട് ഇവിടെ നൽകി */
            background: #f4f7f6; 
            padding: 20px; 
            line-height: 1.6;
        }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
        .header-box { text-align: center; border-bottom: 3px solid #1a5d1a; margin-bottom: 20px; padding-bottom: 10px; }
        h2 { color: #1a5d1a; margin: 0; }
        
        .admin-controls { background: #e8f5e9; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        select { padding: 10px; border-radius: 6px; border: 1px solid #ccc; min-width: 150px; font-weight: bold; font-family: 'Noto Sans Malayalam', sans-serif; }
        .btn-print { background: #1a5d1a; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-left: auto; font-family: 'Noto Sans Malayalam', sans-serif; }
        
        .report-header { background: #1a5d1a; color: white; padding: 12px; border-radius: 5px; text-align: center; margin: 20px 0 10px 0; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th { background: #f0f0f0; color: #333; padding: 12px; text-align: left; border: 1px solid #ddd; }
        td { border: 1px solid #ddd; padding: 12px; font-weight: bold; }
        .count-column { text-align: center; color: #d32f2f; font-size: 1.2em; width: 120px; background: #fff8f8; }

        @media print {
            .admin-controls, .btn-print { display: none !important; }
            .container { box-shadow: none; border: none; width: 100%; }
            body { padding: 0; background: white; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h2>MEMS TRIKARIPUR</h2>
        <p><b>DIVISION-WISE BOOK STOCK REPORT - 2026</b></p>
    </div>

    <div class="admin-controls">
        <label><b>ക്ലാസ്സ്:</b></label>
        <select id="classFilter" onchange="generateDivisionReport()">
            <option value="3">Class 3</option><option value="4">Class 4</option>
            <option value="5">Class 5</option><option value="6">Class 6</option>
            <option value="7">Class 7</option><option value="8">Class 8</option>
        </select>

        <label><b>ഡിവിഷൻ:</b></label>
        <select id="divFilter" onchange="generateDivisionReport()">
            <option value="all">എല്ലാ ഡിവിഷനും (All)</option>
            <option value="A">A</option><option value="B">B</option><option value="C">C</option>
            <option value="D">D</option><option value="E">E</option><option value="F">F</option><option value="G">G</option>
        </select>

        <button class="btn-print" onclick="window.print()">🖨️ പ്രിന്റ് ചെയ്യുക</button>
    </div>

    <div id="reportArea">
        </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzBTYh1xyzmR_7P_RmZ0MXTauh-3OSyNBOU0fk1ztq_AIHKPsfnB_41yqI6_7VHKf8V/exec';
    let allData = [];

    fetch(scriptURL).then(res => res.json()).then(data => {
        allData = data;
        generateDivisionReport();
    });

    function generateDivisionReport() {
        const classVal = document.getElementById('classFilter').value;
        const divVal = document.getElementById('divFilter').value;
        
        const filtered = allData.filter(item => {
            return String(item.sClass) === classVal && (divVal === 'all' || item.division === divVal);
        });

        let html = '';
        const divisions = divVal === 'all' ? [...new Set(filtered.map(item => item.division))].sort() : [divVal];

        divisions.forEach(div => {
            const divData = filtered.filter(item => item.division === div);
            if (divData.length === 0) return;

            let bookCounts = {};
            divData.forEach(item => {
                const books = item.selectedBooks.split(',');
                books.forEach(name => {
                    let cleanName = name.trim();
                    if (cleanName) bookCounts[cleanName] = (bookCounts[cleanName] || 0) + 1;
                });
            });

            html += `<div class="report-header"><h3>ക്ലാസ്സ്: ${classVal}${div} (ഓർഡറുകൾ: ${divData.length})</h3></div>`;
            html += '<table><thead><tr><th>പുസ്തകത്തിന്റെ പേര്</th><th style="text-align:center;">എണ്ണം</th></tr></thead><tbody>';

            Object.keys(bookCounts).sort().forEach(name => {
                html += `<tr><td>${name}</td><td class="count-column">${bookCounts[name]}</td></tr>`;
            });

            html += '</tbody></table>';
        });

        document.getElementById('reportArea').innerHTML = html || '<p style="text-align:center; padding:20px;">വിവരങ്ങൾ ലഭ്യമല്ല.</p>';
    }
</script>

</body>
</html>
